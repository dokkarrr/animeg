name: Scrape AnimeGG

on:
  # ── Run on a schedule (every Sunday at 00:00 UTC) ──────────────────────────
  schedule:
    - cron: "0 0 * * 0"

  # ── Or trigger manually from the Actions tab ───────────────────────────────
  workflow_dispatch:

  # ── Or trigger on every push to main ──────────────────────────────────────
  push:
    branches:
      - main

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max (720 episodes takes a while)

    permissions:
      contents: write      # needed to commit output JSON back to the repo

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Run the scraper
      - name: Run scraper
        run: python scraper.py

      # 6. Commit & push the output JSON files back to the repo
      - name: Commit output JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update scraped JSON [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
